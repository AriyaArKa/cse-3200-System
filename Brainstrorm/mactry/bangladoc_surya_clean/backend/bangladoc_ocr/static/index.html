<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BanglaDOC OCR</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>BanglaDOC OCR</h1>
      <p>Authenticated OCR upload with async processing and report viewer.</p>

      <div class="row">
        <label class="muted" for="apiBase">API Base</label>
        <input id="apiBase" type="text" style="min-width: 280px" />
      </div>

      <div class="auth-grid">
        <input id="email" type="text" placeholder="email@example.com" />
        <input id="password" type="text" placeholder="password" />
      </div>
      <div class="auth-actions">
        <button id="registerBtn" type="button">Register</button>
        <button id="loginBtn" type="button">Login</button>
        <button id="logoutBtn" type="button">Logout</button>
      </div>
      <div id="authStatus" class="muted" style="margin-top:8px;">Not logged in.</div>

      <div id="dropzone" class="dropzone">
        Drop PDF files here or click to choose files
        <div id="fileLabel" class="muted" style="margin-top:8px">No file selected</div>
      </div>
      <input id="fileInput" type="file" accept="application/pdf" multiple hidden />
      <div id="selectedFilesList" class="file-list muted">No files in queue.</div>

      <div class="row">
        <label for="domain">Domain</label>
        <select id="domain">
          <option value="unknown">unknown</option>
          <option value="newspaper">newspaper</option>
          <option value="govt">govt</option>
          <option value="academic">academic</option>
        </select>
        <button id="uploadBtn" type="button">Upload & OCR</button>
      </div>

      <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
      <div id="progressText" class="progress-text"></div>
      <div id="error" class="error"></div>
    </div>

    <div class="card">
      <div class="row" style="margin-top:0;justify-content:space-between;">
        <h2 style="margin:0;font-size:18px;">My Documents</h2>
        <button id="refreshDocsBtn" type="button">Refresh</button>
      </div>
      <div id="docsList" class="docs-list"></div>
    </div>

    <div class="card">
      <h2 style="margin:0 0 8px; font-size:18px;">Results</h2>
      <div id="results" class="muted">No OCR result yet.</div>
    </div>
  </div>

  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
