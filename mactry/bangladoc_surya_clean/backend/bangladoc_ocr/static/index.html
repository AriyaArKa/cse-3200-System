<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Last-Try OCR</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #171a22;
      --panel-2: #1f2430;
      --text: #e6e9ef;
      --muted: #9ba3b4;
      --line: #2c3242;
      --ok: #53d18b;
      --warn: #f5c84c;
      --bad: #ff6b6b;
      --accent: #4da3ff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SF Mono", "Menlo", "Consolas", monospace;
      color: var(--text);
      background:
        radial-gradient(circle at 85% 15%, rgba(77,163,255,0.16), transparent 30%),
        radial-gradient(circle at 10% 90%, rgba(83,209,139,0.12), transparent 35%),
        var(--bg);
      min-height: 100vh;
    }

    .wrap {
      width: min(980px, 92vw);
      margin: 28px auto 42px;
    }

    .card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }

    h1 { margin: 0 0 6px; font-size: 24px; }
    p { margin: 0; color: var(--muted); }

    .dropzone {
      margin-top: 12px;
      border: 1px dashed #4f5c77;
      border-radius: 10px;
      padding: 24px;
      text-align: center;
      transition: border-color 0.2s ease, background-color 0.2s ease;
      cursor: pointer;
      background: rgba(255,255,255,0.02);
    }

    .file-list {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #0d121b;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 4px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .file-item:last-child {
      border-bottom: none;
    }

    .doc-block {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: rgba(255,255,255,0.01);
    }

    .doc-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 8px;
      margin-top: 8px;
      margin-bottom: 10px;
    }

    .summary-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #0d121b;
    }

    .summary-box .k {
      color: var(--muted);
      font-size: 12px;
    }

    .summary-box .v {
      font-size: 15px;
      font-weight: 700;
      margin-top: 3px;
    }

    .doc-index {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #0d121b;
    }

    .chip-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .chip {
      font-size: 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 7px;
      color: var(--text);
      text-decoration: none;
      background: #121826;
    }

    .chip.ok {
      border-color: #2f785d;
      color: #8cf0c4;
    }

    .chip.miss {
      border-color: #844930;
      color: #ffb18d;
      opacity: 0.85;
      cursor: not-allowed;
    }

    .global-summary {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
      background: #0d121b;
    }

    .global-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 6px 0;
    }

    .global-row:last-child {
      border-bottom: none;
    }

    .page-details {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      margin-top: 8px;
      background: rgba(255,255,255,0.01);
    }

    .page-details > summary {
      cursor: pointer;
      list-style: none;
    }

    .page-details > summary::-webkit-details-marker {
      display: none;
    }

    .dropzone.dragover {
      border-color: var(--accent);
      background: rgba(77,163,255,0.08);
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
      align-items: center;
    }

    select, input[type="text"], button {
      background: #0f141f;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      font-weight: 600;
      background: linear-gradient(180deg, #1a3152, #14233a);
      border-color: #2a456a;
    }

    button:hover { filter: brightness(1.08); }

    .progress-track {
      margin-top: 10px;
      width: 100%;
      background: #0b0f17;
      border-radius: 999px;
      border: 1px solid var(--line);
      overflow: hidden;
      height: 12px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4da3ff, #53d18b);
      transition: width 0.25s ease;
    }

    .progress-text {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      min-height: 18px;
    }

    .result-page {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
      background: rgba(255,255,255,0.01);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid transparent;
    }

    .badge.digital { color: #7cc6ff; border-color: #2f5d86; }
    .badge.easyocr { color: #ffe18a; border-color: #75652c; }
    .badge.paddleocr { color: #8cf0c4; border-color: #2f785d; }
    .badge.gemini { color: #cfa7ff; border-color: #694787; }
    .badge.ollama { color: #ffb18d; border-color: #844930; }

    .text-box {
      white-space: pre-wrap;
      max-height: 220px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #0d121b;
      color: #d9dfeb;
      line-height: 1.45;
      font-size: 13px;
    }

    .muted { color: var(--muted); font-size: 13px; }

    .error { color: var(--bad); font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Last-Try OCR</h1>
      <p>Bangla + English PDF OCR with corpus export.</p>

      <div class="row">
        <label class="muted" for="apiBase">API Base</label>
        <input id="apiBase" type="text" style="min-width: 280px" />
      </div>

      <div id="dropzone" class="dropzone">
        Drop PDF files here or click to choose files
        <div id="fileLabel" class="muted" style="margin-top:8px">No file selected</div>
      </div>
      <input id="fileInput" type="file" accept="application/pdf" multiple hidden />
      <div id="selectedFilesList" class="file-list muted">No files in queue.</div>

      <div class="row">
        <label for="domain">Domain</label>
        <select id="domain">
          <option value="unknown">unknown</option>
          <option value="newspaper">newspaper</option>
          <option value="govt">govt</option>
          <option value="academic">academic</option>
        </select>
        <button id="uploadBtn">Upload & OCR</button>
      </div>

      <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
      <div id="progressText" class="progress-text"></div>
      <div id="error" class="error"></div>
    </div>

    <div class="card">
      <h2 style="margin:0 0 8px; font-size:18px;">Results</h2>
      <div id="results" class="muted">No OCR result yet.</div>
    </div>

  </div>

  <script>
    const state = {
      files: [],
      progressTimer: null
    };

    const el = {
      apiBase: document.getElementById("apiBase"),
      dropzone: document.getElementById("dropzone"),
      fileInput: document.getElementById("fileInput"),
      fileLabel: document.getElementById("fileLabel"),
      selectedFilesList: document.getElementById("selectedFilesList"),
      domain: document.getElementById("domain"),
      uploadBtn: document.getElementById("uploadBtn"),
      progressBar: document.getElementById("progressBar"),
      progressText: document.getElementById("progressText"),
      error: document.getElementById("error"),
      results: document.getElementById("results")
    };

    function getDefaultBase() {
      if (window.location.protocol === "http:" || window.location.protocol === "https:") {
        return window.location.origin;
      }
      return "http://localhost:8000";
    }

    function fileId(file) {
      return `${file.name}::${file.size}::${file.lastModified}`;
    }

    function formatSize(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
    }

    function formatDuration(ms) {
      const value = Number(ms || 0);
      if (!Number.isFinite(value) || value <= 0) return "n/a";
      if (value < 1000) return `${Math.round(value)} ms`;
      const sec = value / 1000;
      if (sec < 60) return `${sec.toFixed(2)} s`;
      const min = Math.floor(sec / 60);
      const rem = sec % 60;
      return `${min}m ${rem.toFixed(1)}s`;
    }

    function renderSelectedFiles() {
      if (!state.files.length) {
        el.fileLabel.textContent = "No file selected";
        el.selectedFilesList.innerHTML = "No files in queue.";
        return;
      }

      const selectedCount = state.files.filter((f) => f.selected).length;
      el.fileLabel.textContent = `${selectedCount}/${state.files.length} selected`;

      let html = "";
      for (const entry of state.files) {
        const safeName = escapeHtml(entry.file.name);
        const checked = entry.selected ? "checked" : "";
        html += `
          <div class="file-item">
            <label class="muted" style="display:flex;align-items:center;gap:8px;">
              <input type="checkbox" data-file-toggle="${entry.id}" ${checked} />
              <span>${safeName} (${formatSize(entry.file.size)})</span>
            </label>
            <button type="button" data-file-remove="${entry.id}" style="padding:6px 8px;">Remove</button>
          </div>
        `;
      }
      el.selectedFilesList.innerHTML = html;

      el.selectedFilesList.querySelectorAll("input[data-file-toggle]").forEach((input) => {
        input.addEventListener("change", () => {
          const id = input.getAttribute("data-file-toggle");
          const entry = state.files.find((f) => f.id === id);
          if (entry) {
            entry.selected = input.checked;
            renderSelectedFiles();
          }
        });
      });

      el.selectedFilesList.querySelectorAll("button[data-file-remove]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-file-remove");
          state.files = state.files.filter((f) => f.id !== id);
          renderSelectedFiles();
        });
      });
    }

    function addFiles(fileList) {
      const incoming = Array.from(fileList || []);
      if (!incoming.length) return;

      for (const file of incoming) {
        const isPdf = (file.type === "application/pdf") || file.name.toLowerCase().endsWith(".pdf");
        if (!isPdf) continue;
        const id = fileId(file);
        if (state.files.some((f) => f.id === id)) continue;
        state.files.push({ id, file, selected: true });
      }

      renderSelectedFiles();
    }

    function api(path) {
      const base = el.apiBase.value.replace(/\/$/, "");
      return base + path;
    }

    function setProgress(current, total) {
      if (!total || total <= 0) {
        el.progressBar.style.width = "0%";
        return;
      }
      const pct = Math.min(100, Math.round((current / total) * 100));
      el.progressBar.style.width = pct + "%";
      el.progressText.textContent = `Processing page ${current} of ${total}...`;
    }

    async function pollProgress() {
      try {
        const res = await fetch(api("/ocr/progress"));
        if (!res.ok) return;
        const p = await res.json();
        if (p.is_processing) {
          setProgress(p.current_page || 0, p.total_pages || 0);
        }
      } catch (_) {
        // Keep UI responsive even if progress endpoint is temporarily unavailable.
      }
    }

    function startPolling() {
      stopPolling();
      state.progressTimer = setInterval(pollProgress, 500);
    }

    function stopPolling() {
      if (state.progressTimer) {
        clearInterval(state.progressTimer);
        state.progressTimer = null;
      }
    }

    function normalizeEngine(engine) {
      const e = (engine || "unknown").toLowerCase();
      if (e.includes("pymupdf") || e.includes("digital")) return "digital";
      if (e.includes("easy")) return "easyocr";
      if (e.includes("paddle")) return "paddleocr";
      if (e.includes("gemini")) return "gemini";
      if (e.includes("ollama")) return "ollama";
      return "digital";
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function markVerified(docId, pageNumber, verified, button) {
      button.disabled = true;
      try {
        const res = await fetch(api("/corpus/verify"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ doc_id: docId, page_number: pageNumber, verified })
        });
        if (!res.ok) {
          const t = await res.text();
          throw new Error(t || "Verification failed");
        }
        button.textContent = verified ? "Verified" : "Mark as Verified";
      } catch (err) {
        alert("Verify update failed: " + err.message);
      } finally {
        button.disabled = false;
      }
    }

    function renderResults(payload) {
      const docs = payload.documents || [];
      if (!docs.length) {
        el.results.innerHTML = "<div class='muted'>No results returned.</div>";
        return;
      }

      let html = "";
      const globalRows = [];
      docs.forEach((doc, idx) => {
        if (doc.error) {
          html += `<div class="error">${doc.filename || "file"}: ${doc.error}</div>`;
          globalRows.push(
            `<div class="global-row"><span>${escapeHtml(doc.filename || `Document ${idx + 1}`)}</span><span class="error">Failed</span></div>`
          );
          return;
        }

        const docId = doc.doc_id || "";
        const sourceName = (doc.document && doc.document.source) || doc.filename || `Document ${idx + 1}`;
        const pages = Array.isArray(doc.pages) ? [...doc.pages] : [];
        pages.sort((a, b) => (a.page_number || 0) - (b.page_number || 0));

        const expectedPagesRaw = doc.document && Number(doc.document.total_pages);
        const expectedPages = Number.isFinite(expectedPagesRaw) && expectedPagesRaw > 0
          ? expectedPagesRaw
          : pages.length;
        const processingMs = doc.document && doc.document.processing_summary
          ? Number(doc.document.processing_summary.processing_time_ms || 0)
          : 0;
        const processingTime = formatDuration(processingMs);

        const presentSet = new Set(pages.map((p) => Number(p.page_number || 0)).filter((n) => n > 0));
        const presentPages = Array.from(presentSet).sort((a, b) => a - b);

        const missingPages = [];
        for (let p = 1; p <= expectedPages; p += 1) {
          if (!presentSet.has(p)) missingPages.push(p);
        }

        const completion = `${presentPages.length}/${expectedPages}`;
        const status = missingPages.length ? `Missing ${missingPages.length}` : "Complete";
        globalRows.push(
          `<div class="global-row"><span>${escapeHtml(sourceName)}</span><span class="muted">${completion} pages · ${status} · ${processingTime}</span></div>`
        );

        let pageIndexHtml = "";
        if (expectedPages <= 120) {
          for (let p = 1; p <= expectedPages; p += 1) {
            if (presentSet.has(p)) {
              pageIndexHtml += `<a class="chip ok" href="#doc-${idx}-page-${p}">P${p}</a>`;
            } else {
              pageIndexHtml += `<span class="chip miss">P${p}</span>`;
            }
          }
        } else {
          pageIndexHtml = `<span class="muted">Document has ${expectedPages} pages. Use page cards below to review.</span>`;
        }

        html += `
          <div class="doc-block">
            <div class="meta" style="margin-bottom:10px;">
              <strong>${escapeHtml(sourceName)}</strong>
              <span class="muted">doc_id: ${escapeHtml(docId)}</span>
              <span class="muted">pages returned: ${presentPages.length}</span>
            </div>
            <div class="doc-summary">
              <div class="summary-box">
                <div class="k">Page Coverage</div>
                <div class="v">${completion}</div>
              </div>
              <div class="summary-box">
                <div class="k">Status</div>
                <div class="v">${missingPages.length ? `Missing: ${missingPages.join(", ")}` : "All pages present"}</div>
              </div>
              <div class="summary-box">
                <div class="k">Processing Time</div>
                <div class="v">${processingTime}</div>
              </div>
            </div>
            <div class="doc-index">
              <div class="muted">Quick page check</div>
              <div class="chip-wrap">${pageIndexHtml}</div>
            </div>
        `;

        pages.forEach((page, pageIdx) => {
          const engine = (page.extraction && page.extraction.engine) || "unknown";
          const tag = normalizeEngine(engine);
          const score = page.extraction && typeof page.extraction.confidence_score === "number"
            ? page.extraction.confidence_score.toFixed(4)
            : "0.0000";
          const safeText = escapeHtml(page.full_text || "");
          const decisions = Array.isArray(page.decisions) ? page.decisions : [];
          const decisionsHtml = decisions.length
            ? decisions.map((d) => {
                const detail = escapeHtml(d.detail || "");
                const keyword = escapeHtml(d.keyword || "DECISION");
                const sev = escapeHtml(d.severity || "info");
                return `<div class="muted" style="margin-top:4px;">[${sev}] ${keyword}: ${detail}</div>`;
              }).join("")
            : `<div class="muted" style="margin-top:4px;">No decision log available.</div>`;
          const verified = !!page.verified;
          const pn = Number(page.page_number || 0);

          html += `
            <details class="page-details" ${pageIdx === 0 ? "open" : ""} id="doc-${idx}-page-${pn}">
              <summary>
                <div class="meta" style="margin-bottom:0;">
                  <strong>Page ${pn}</strong>
                  <span class="badge ${tag}">${engine}</span>
                  <span class="muted">Confidence: ${score}</span>
                  <span class="muted">${verified ? "Verified" : "Not verified"}</span>
                </div>
              </summary>
              <div class="result-page" style="margin-top:8px;">
                <div class="text-box">${safeText || "(empty)"}</div>
                <details style="margin-top:8px;">
                  <summary class="muted">Show decisions</summary>
                  <div style="margin-top:6px;">${decisionsHtml}</div>
                </details>
                <div class="row" style="margin-top:8px;">
                  <button data-doc="${docId}" data-page="${pn}" data-verified="${verified ? "0" : "1"}">
                    ${verified ? "Verified" : "Mark as Verified"}
                  </button>
                </div>
              </div>
            </details>
          `;
        });

        html += `</div>`;
      });

      if (globalRows.length) {
        html = `
          <div class="global-summary">
            <strong>Documents Overview</strong>
            <div style="margin-top:6px;">${globalRows.join("")}</div>
          </div>
        ` + html;
      }

      el.results.innerHTML = html;

      const buttons = el.results.querySelectorAll("button[data-doc]");
      buttons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const docId = btn.getAttribute("data-doc");
          const page = Number(btn.getAttribute("data-page"));
          const target = btn.getAttribute("data-verified") === "1";
          markVerified(docId, page, target, btn);
          btn.setAttribute("data-verified", target ? "0" : "1");
        });
      });
    }

    async function upload() {
      const selectedFiles = state.files.filter((f) => f.selected).map((f) => f.file);
      if (!selectedFiles.length) {
        el.error.textContent = "Please select at least one PDF file.";
        return;
      }

      el.error.textContent = "";
      el.progressBar.style.width = "0%";
      el.progressText.textContent = `Submitting ${selectedFiles.length} file(s)...`;
      startPolling();

      const fd = new FormData();
      for (const file of selectedFiles) {
        fd.append("files", file);
      }
      fd.append("domain", el.domain.value);

      try {
        const res = await fetch(api("/ocr"), { method: "POST", body: fd });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || "Upload failed");
        }
        el.progressBar.style.width = "100%";
        el.progressText.textContent = "Processing complete.";
        renderResults(data);
      } catch (err) {
        el.error.textContent = err.message;
      } finally {
        stopPolling();
      }
    }

    el.dropzone.addEventListener("click", () => el.fileInput.click());
    el.fileInput.addEventListener("change", (e) => {
      addFiles(e.target.files);
      e.target.value = "";
    });

    el.dropzone.addEventListener("dragover", (e) => {
      e.preventDefault();
      el.dropzone.classList.add("dragover");
    });

    el.dropzone.addEventListener("dragleave", () => el.dropzone.classList.remove("dragover"));

    el.dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      el.dropzone.classList.remove("dragover");
      if (e.dataTransfer.files && e.dataTransfer.files.length) {
        addFiles(e.dataTransfer.files);
      }
    });

    el.uploadBtn.addEventListener("click", upload);
    el.apiBase.value = getDefaultBase();
  </script>
</body>
</html>
