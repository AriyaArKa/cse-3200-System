version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bangladoc
      POSTGRES_PASSWORD: bangladoc
      POSTGRES_DB: bangladoc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bangladoc"]
      interval: 5s
      retries: 5
volumes:
  pgdata:
