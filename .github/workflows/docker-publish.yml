name: Build and Publish Docker Image

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: arkanath55/varnoq_system_project

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME != '' && vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker Hub username
        id: dockerhub_user
        run: |
          RESOLVED_USERNAME="$DOCKERHUB_USERNAME"
          if [ -z "$RESOLVED_USERNAME" ]; then
            RESOLVED_USERNAME="${IMAGE_NAME%%/*}"
          fi
          if [ -z "$RESOLVED_USERNAME" ]; then
            echo "Unable to resolve Docker Hub username. Set DOCKERHUB_USERNAME variable/secret or ensure IMAGE_NAME is in 'username/repository' format." >&2
            exit 1
          fi
          echo "username=$RESOLVED_USERNAME" >> "$GITHUB_OUTPUT"

      - name: Validate Docker Hub credentials
        run: |
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "DOCKERHUB_TOKEN secret is missing." >&2
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.dockerhub_user.outputs.username }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=tagname,enable={{is_default_branch}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./Varnoq/Varnoq System
          file: ./Varnoq/Varnoq System/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
