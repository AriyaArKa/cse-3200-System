<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Last-Try OCR</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #171a22;
      --panel-2: #1f2430;
      --text: #e6e9ef;
      --muted: #9ba3b4;
      --line: #2c3242;
      --ok: #53d18b;
      --warn: #f5c84c;
      --bad: #ff6b6b;
      --accent: #4da3ff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SF Mono", "Menlo", "Consolas", monospace;
      color: var(--text);
      background:
        radial-gradient(circle at 85% 15%, rgba(77,163,255,0.16), transparent 30%),
        radial-gradient(circle at 10% 90%, rgba(83,209,139,0.12), transparent 35%),
        var(--bg);
      min-height: 100vh;
    }

    .wrap {
      width: min(980px, 92vw);
      margin: 28px auto 42px;
    }

    .card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }

    h1 { margin: 0 0 6px; font-size: 24px; }
    p { margin: 0; color: var(--muted); }

    .dropzone {
      margin-top: 12px;
      border: 1px dashed #4f5c77;
      border-radius: 10px;
      padding: 24px;
      text-align: center;
      transition: border-color 0.2s ease, background-color 0.2s ease;
      cursor: pointer;
      background: rgba(255,255,255,0.02);
    }

    .dropzone.dragover {
      border-color: var(--accent);
      background: rgba(77,163,255,0.08);
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
      align-items: center;
    }

    select, input[type="text"], button {
      background: #0f141f;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      font-weight: 600;
      background: linear-gradient(180deg, #1a3152, #14233a);
      border-color: #2a456a;
    }

    button:hover { filter: brightness(1.08); }

    .progress-track {
      margin-top: 10px;
      width: 100%;
      background: #0b0f17;
      border-radius: 999px;
      border: 1px solid var(--line);
      overflow: hidden;
      height: 12px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4da3ff, #53d18b);
      transition: width 0.25s ease;
    }

    .progress-text {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      min-height: 18px;
    }

    .result-page {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
      background: rgba(255,255,255,0.01);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid transparent;
    }

    .badge.digital { color: #7cc6ff; border-color: #2f5d86; }
    .badge.easyocr { color: #ffe18a; border-color: #75652c; }
    .badge.paddleocr { color: #8cf0c4; border-color: #2f785d; }
    .badge.gemini { color: #cfa7ff; border-color: #694787; }
    .badge.ollama { color: #ffb18d; border-color: #844930; }

    .text-box {
      white-space: pre-wrap;
      max-height: 220px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #0d121b;
      color: #d9dfeb;
      line-height: 1.45;
      font-size: 13px;
    }

    .muted { color: var(--muted); font-size: 13px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #101622;
    }

    .stat .k { color: var(--muted); font-size: 12px; }
    .stat .v { font-size: 18px; font-weight: 700; }

    .error { color: var(--bad); font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Last-Try OCR</h1>
      <p>Bangla + English PDF OCR with corpus export.</p>

      <div class="row">
        <label class="muted" for="apiBase">API Base</label>
        <input id="apiBase" type="text" style="min-width: 280px" />
      </div>

      <div id="dropzone" class="dropzone">
        Drop PDF here or click to choose a file
        <div id="fileLabel" class="muted" style="margin-top:8px">No file selected</div>
      </div>
      <input id="fileInput" type="file" accept="application/pdf" hidden />

      <div class="row">
        <label for="domain">Domain</label>
        <select id="domain">
          <option value="unknown">unknown</option>
          <option value="newspaper">newspaper</option>
          <option value="govt">govt</option>
          <option value="academic">academic</option>
        </select>
        <button id="uploadBtn">Upload & OCR</button>
      </div>

      <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
      <div id="progressText" class="progress-text"></div>
      <div id="error" class="error"></div>
    </div>

    <div class="card">
      <h2 style="margin:0 0 8px; font-size:18px;">Results</h2>
      <div id="results" class="muted">No OCR result yet.</div>
    </div>

    <div class="card">
      <h2 style="margin:0 0 8px; font-size:18px;">Corpus Stats</h2>
      <button id="refreshStats">Refresh Stats</button>
      <a id="downloadCorpus" href="#" style="margin-left:8px; color:#8ec5ff;">Download Corpus</a>
      <div id="stats" class="stats-grid"></div>
    </div>
  </div>

  <script>
    const state = {
      file: null,
      progressTimer: null,
      lastDocId: ""
    };

    const el = {
      apiBase: document.getElementById("apiBase"),
      dropzone: document.getElementById("dropzone"),
      fileInput: document.getElementById("fileInput"),
      fileLabel: document.getElementById("fileLabel"),
      domain: document.getElementById("domain"),
      uploadBtn: document.getElementById("uploadBtn"),
      progressBar: document.getElementById("progressBar"),
      progressText: document.getElementById("progressText"),
      error: document.getElementById("error"),
      results: document.getElementById("results"),
      refreshStats: document.getElementById("refreshStats"),
      stats: document.getElementById("stats"),
      downloadCorpus: document.getElementById("downloadCorpus")
    };

    function getDefaultBase() {
      if (window.location.protocol === "http:" || window.location.protocol === "https:") {
        return window.location.origin;
      }
      return "http://localhost:8000";
    }

    function api(path) {
      const base = el.apiBase.value.replace(/\/$/, "");
      return base + path;
    }

    function setProgress(current, total) {
      if (!total || total <= 0) {
        el.progressBar.style.width = "0%";
        return;
      }
      const pct = Math.min(100, Math.round((current / total) * 100));
      el.progressBar.style.width = pct + "%";
      el.progressText.textContent = `Processing page ${current} of ${total}...`;
    }

    async function pollProgress() {
      try {
        const res = await fetch(api("/ocr/progress"));
        if (!res.ok) return;
        const p = await res.json();
        if (p.is_processing) {
          setProgress(p.current_page || 0, p.total_pages || 0);
        }
      } catch (_) {
        // Keep UI responsive even if progress endpoint is temporarily unavailable.
      }
    }

    function startPolling() {
      stopPolling();
      state.progressTimer = setInterval(pollProgress, 500);
    }

    function stopPolling() {
      if (state.progressTimer) {
        clearInterval(state.progressTimer);
        state.progressTimer = null;
      }
    }

    function normalizeEngine(engine) {
      const e = (engine || "unknown").toLowerCase();
      if (e.includes("pymupdf") || e.includes("digital")) return "digital";
      if (e.includes("easy")) return "easyocr";
      if (e.includes("paddle")) return "paddleocr";
      if (e.includes("gemini")) return "gemini";
      if (e.includes("ollama")) return "ollama";
      return "digital";
    }

    async function markVerified(docId, pageNumber, verified, button) {
      button.disabled = true;
      try {
        const res = await fetch(api("/corpus/verify"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ doc_id: docId, page_number: pageNumber, verified })
        });
        if (!res.ok) {
          const t = await res.text();
          throw new Error(t || "Verification failed");
        }
        button.textContent = verified ? "Verified" : "Mark as Verified";
      } catch (err) {
        alert("Verify update failed: " + err.message);
      } finally {
        button.disabled = false;
        loadStats();
      }
    }

    function renderResults(payload) {
      const docs = payload.documents || [];
      if (!docs.length) {
        el.results.innerHTML = "<div class='muted'>No results returned.</div>";
        return;
      }

      let html = "";
      for (const doc of docs) {
        if (doc.error) {
          html += `<div class="error">${doc.filename || "file"}: ${doc.error}</div>`;
          continue;
        }

        const docId = doc.doc_id || "";
        state.lastDocId = docId;
        const pages = doc.pages || [];
        html += `<div class="muted" style="margin:8px 0;">doc_id: ${docId}</div>`;

        for (const page of pages) {
          const engine = (page.extraction && page.extraction.engine) || "unknown";
          const tag = normalizeEngine(engine);
          const score = page.extraction && typeof page.extraction.confidence_score === "number"
            ? page.extraction.confidence_score.toFixed(4)
            : "0.0000";
          const safeText = (page.full_text || "").replace(/</g, "&lt;");
          const verified = !!page.verified;

          html += `
            <div class="result-page">
              <div class="meta">
                <strong>Page ${page.page_number}</strong>
                <span class="badge ${tag}">${engine}</span>
                <span class="muted">Confidence: ${score}</span>
              </div>
              <div class="text-box">${safeText || "(empty)"}</div>
              <div class="row" style="margin-top:8px;">
                <button data-doc="${docId}" data-page="${page.page_number}" data-verified="${verified ? "0" : "1"}">
                  ${verified ? "Verified" : "Mark as Verified"}
                </button>
              </div>
            </div>
          `;
        }
      }

      el.results.innerHTML = html;

      const buttons = el.results.querySelectorAll("button[data-doc]");
      buttons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const docId = btn.getAttribute("data-doc");
          const page = Number(btn.getAttribute("data-page"));
          const target = btn.getAttribute("data-verified") === "1";
          markVerified(docId, page, target, btn);
          btn.setAttribute("data-verified", target ? "0" : "1");
        });
      });
    }

    async function loadStats() {
      try {
        const res = await fetch(api("/corpus/stats"));
        const data = res.ok ? await res.json() : { total_records: 0 };

        const blocks = [
          ["Total Records", data.total_records || 0],
          ["Avg Confidence", data.avg_confidence || 0],
          ["Total Words", data.total_words || 0],
          ["Total Chars", data.total_chars || 0]
        ];

        let html = "";
        for (const [k, v] of blocks) {
          html += `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`;
        }
        el.stats.innerHTML = html;
      } catch (err) {
        el.stats.innerHTML = `<div class="error">Failed to load stats: ${err.message}</div>`;
      }

      el.downloadCorpus.href = api("/corpus/export");
    }

    async function upload() {
      if (!state.file) {
        el.error.textContent = "Please choose a PDF file first.";
        return;
      }

      el.error.textContent = "";
      el.progressBar.style.width = "0%";
      el.progressText.textContent = "Submitting file...";
      startPolling();

      const fd = new FormData();
      fd.append("files", state.file);
      fd.append("domain", el.domain.value);

      try {
        const res = await fetch(api("/ocr"), { method: "POST", body: fd });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || "Upload failed");
        }
        el.progressBar.style.width = "100%";
        el.progressText.textContent = "Processing complete.";
        renderResults(data);
        loadStats();
      } catch (err) {
        el.error.textContent = err.message;
      } finally {
        stopPolling();
      }
    }

    function onFileSelected(file) {
      state.file = file;
      el.fileLabel.textContent = file ? `${file.name} (${Math.round(file.size / 1024)} KB)` : "No file selected";
    }

    el.dropzone.addEventListener("click", () => el.fileInput.click());
    el.fileInput.addEventListener("change", (e) => onFileSelected(e.target.files[0]));

    el.dropzone.addEventListener("dragover", (e) => {
      e.preventDefault();
      el.dropzone.classList.add("dragover");
    });

    el.dropzone.addEventListener("dragleave", () => el.dropzone.classList.remove("dragover"));

    el.dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      el.dropzone.classList.remove("dragover");
      if (e.dataTransfer.files && e.dataTransfer.files[0]) {
        onFileSelected(e.dataTransfer.files[0]);
      }
    });

    el.uploadBtn.addEventListener("click", upload);
    el.refreshStats.addEventListener("click", loadStats);

    el.apiBase.value = getDefaultBase();
    loadStats();
  </script>
</body>
</html>
